<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI Sourcing — GDJ Invest</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--card:#fff;--t1:#1a1a1a;--t2:#6b6b68;--t3:#9b9b98;
  --b1:rgba(0,0,0,.1);--b2:rgba(0,0,0,.18);
  --rad:10px;--radl:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181816;--card:#1e1e1c;--t1:#f0efe8;--t2:#a8a8a4;--t3:#6b6b68;
  --b1:rgba(255,255,255,.08);--b2:rgba(255,255,255,.15);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;padding:1.5rem 1rem}
.wrap{max-width:680px;margin:0 auto}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:36px;height:auto}
.brand h1{font-size:16px;font-weight:500;color:var(--t1)}
.brand p{font-size:12px;color:var(--t2)}
.btn-refresh{display:flex;align-items:center;gap:6px;height:34px;padding:0 14px;border:.5px solid var(--b2);border-radius:var(--rad);background:none;cursor:pointer;font-size:12px;color:var(--t2);font-family:inherit}
.btn-refresh:hover{background:var(--b1)}
.btn-refresh.loading i{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem}
.tab{height:32px;padding:0 16px;border:.5px solid var(--b2);border-radius:var(--rad);background:none;cursor:pointer;font-size:13px;color:var(--t2);font-family:inherit}
.tab.on{background:var(--card);color:var(--t1);font-weight:500}
.panel{display:none}
.panel.on{display:block}
.funnel{display:flex;flex-direction:column;align-items:center;margin-bottom:1rem}
.sw{display:flex;flex-direction:column;align-items:center;width:100%}
.step{width:100%;display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;border-radius:var(--rad);border:.5px solid rgba(0,0,0,.07)}
.sl{display:flex;align-items:center;gap:10px}
.si{font-size:16px;flex-shrink:0}
.sn{font-size:13px;font-weight:500}
.ss{font-size:11px;margin-top:1px;opacity:.65}
.sc-num{font-size:22px;font-weight:500}
.arr{display:flex;flex-direction:column;align-items:center;padding:3px 0;width:100%}
.al{width:1px;height:10px;background:var(--b2)}
.ar{font-size:11px;color:var(--t3);background:var(--card);border:.5px solid var(--b1);border-radius:20px;padding:2px 9px;margin:2px 0}
.at{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--b2)}
.op-sep{width:100%;display:flex;align-items:center;gap:8px;margin:6px 0}
.op-sep-line{flex:1;height:.5px;background:var(--b1)}
.op-sep-lbl{font-size:10px;color:var(--t3);white-space:nowrap;padding:0 4px;display:flex;align-items:center;gap:4px}
.bottom{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.5rem}
.mc{background:var(--card);border:.5px solid var(--b1);border-radius:var(--radl);padding:.8rem 1rem}
.mt{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
.br{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.bl{font-size:11px;color:var(--t2);width:58px;flex-shrink:0}
.bt{flex:1;height:5px;background:var(--b1);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px}
.bp{font-size:11px;color:var(--t2);width:30px;text-align:right;flex-shrink:0}
.status{text-align:center;padding:2rem;font-size:13px;color:var(--t2)}
.err{color:#a32d2d;font-size:12px;margin-top:.25rem}
.lupdate{font-size:11px;color:var(--t3);text-align:right;margin-bottom:.75rem}
</style>
</head>

      <div>
        <h1>Entonnoir sourcing</h1>
        <p>Taux de conversion pipeline</p>
      </div>
    </div>
    <button class="btn-refresh" id="btnR" onclick="loadAll()">
      <i class="ti ti-refresh"></i> Actualiser
    </button>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="show('mois',this)">Mois</button>
    <button class="tab" onclick="show('trim',this)">Trimestre</button>
    <button class="tab" onclick="show('annee',this)">Année</button>
  </div>

  <div class="lupdate" id="lupdate"></div>
  <div class="panel on" id="p-mois"><div class="status">Chargement...</div></div>
  <div class="panel" id="p-trim"><div class="status">Chargement...</div></div>
  <div class="panel" id="p-annee"><div class="status">Chargement...</div></div>
</div>

<script>
var STEPS = [
  {key:"leads",   label:"Leads détectés",       sub:"A. Lead à traiter",  bg:"#e6f1fb",tc:"#0c447c",sc:"#185fa5",icon:"ti-map-pin"},
  {key:"visites", label:"Visites réalisées",     sub:"E. Visite",               bg:"#eeedfe",tc:"#3c3489",sc:"#534ab7",icon:"ti-door-enter"},
  {key:"offres",  label:"Offres faites",                   sub:"G. Offre faite",           bg:"#e1f5ee",tc:"#085041",sc:"#0f6e56",icon:"ti-file-text"},
  {key:"signees", label:"Offres contre-signées",      sub:"H. Offre signée",     bg:"#eaf3de",tc:"#27500a",sc:"#3b6d11",icon:"ti-signature"},
  {key:"puv",     label:"PUV / compromis signé",      sub:"Suivi projets",            bg:"#faeeda",tc:"#633806",sc:"#854f0b",icon:"ti-writing",   op:true},
  {key:"acte",    label:"Acte d’achat signé",    sub:"Suivi projets",            bg:"#fcebeb",tc:"#791f1f",sc:"#a32d2d",icon:"ti-building-estate",op:true}
];

var WIDTHS = ["100%","88%","76%","64%","52%","40%"];

function getRange(period) {
  var now = new Date();
  var start, end;
  if (period === "mois") {
    start = new Date(now.getFullYear(), now.getMonth(), 1);
    end   = new Date(now.getFullYear(), now.getMonth()+1, 0);
  } else if (period === "trim") {
    var q = Math.floor(now.getMonth()/3);
    start = new Date(now.getFullYear(), q*3, 1);
    end   = new Date(now.getFullYear(), q*3+3, 0);
  } else {
    start = new Date(now.getFullYear(), 0, 1);
    end   = new Date(now.getFullYear(), 11, 31);
  }
  return {
    start: start.toISOString().split("T")[0],
    end:   end.toISOString().split("T")[0]
  };
}

async function queryNotion(range) {
  var prompt = "Interroge la base SOURCING Notion (collection://340ac828-7d5d-8072-96fc-000b64c5d7fc). Filtre les dossiers dont la Date de detection est entre " + range.start + " et " + range.end + ". Compte : leads = tous statuts sauf J et I ; visites = statuts E F G H ; offres = statuts G H ; signees = statut H. Compte aussi par valeur du champ Motif no-go visite : Prix, Technique, Juridique, Marche, Autre. Et par valeur du champ Arbitrage post-visite : Preparation offre, Abandon, Analyse complementaire, Attente veille. Reponds UNIQUEMENT en JSON : {counts:{leads:N,visites:N,offres:N,signees:N},nogoPrix:N,nogoTech:N,nogoJur:N,nogoMar:N,nogoAutre:N,arbOffre:N,arbAban:N,arbAna:N,arbVeille:N}";

  var resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 800,
      system: "Tu interroges Notion via MCP et reponds UNIQUEMENT en JSON valide sans markdown.",
      messages: [{role:"user", content: prompt}]
    })
  });
  return resp.json();
}

async function loadPeriod(period) {
  var el = document.getElementById("p-"+period);
  el.innerHTML = "<div class='status'>Chargement...</div>";
  var range = getRange(period);
  try {
    var data = await queryNotion(range);
    var text = data.content.filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
    var clean = text.replace(/```json|```/g,"").trim();
    var d = JSON.parse(clean);
    renderPanel(period, d);
  } catch(e) {
    el.innerHTML = "<div class='status'>Impossible de charger les données.<br><span class='err'>" + e.message + "</span></div>";
  }
}

function pct(a, b) {
  if (!b || b === 0) return "—";
  return Math.round(a/b*100) + " %";
}

function bar(label, count, total, color) {
  var p = total > 0 ? Math.round(count/total*100) : 0;
  return "<div class='br'><div class='bl'>" + label + "</div><div class='bt'><div class='bf' style='width:" + p + "%;background:" + color + "'></div></div><div class='bp'>" + p + "%</div></div>";
}

function renderPanel(pid, d) {
  var el = document.getElementById("p-"+pid);
  var counts = d.counts || {};
  var vals = [counts.leads||0, counts.visites||0, counts.offres||0, counts.signees||0, 0, 0];
  var html = "<div class='funnel'>";
  var opStarted = false;

  for (var i = 0; i < STEPS.length; i++) {
    var s = STEPS[i];
    var v = vals[i];
    var dimStyle = s.op ? " style='opacity:.5'" : "";
    html += "<div class='sw'" + dimStyle + ">";
    if (s.op && !opStarted) {
      opStarted = true;
      html += "<div class='op-sep'><div class='op-sep-line'></div><div class='op-sep-lbl'><i class='ti ti-clock' style='font-size:10px'></i> Opérationnel — à venir</div><div class='op-sep-line'></div></div>";
    }
    html += "<div class='step' style='background:" + s.bg + ";max-width:" + WIDTHS[i] + "'>";
    html += "<div class='sl'><i class='ti " + s.icon + " si' style='color:" + s.sc + "' aria-hidden='true'></i>";
    html += "<div><div class='sn' style='color:" + s.tc + "'>" + s.label + "</div><div class='ss' style='color:" + s.sc + "'>" + s.sub + "</div></div></div>";
    html += "<div class='sc-num' style='color:" + s.tc + "'>" + v + "</div></div></div>";
    if (i < STEPS.length - 1) {
      var rate = pct(vals[i+1], v);
      html += "<div class='arr'><div class='al'></div><div class='ar'>→ " + rate + "</div><div class='at'></div></div>";
    }
  }
  html += "</div>";

  var nogoTotal = (d.nogoPrix||0)+(d.nogoTech||0)+(d.nogoJur||0)+(d.nogoMar||0)+(d.nogoAutre||0);
  var arbTotal  = (d.arbOffre||0)+(d.arbAban||0)+(d.arbAna||0)+(d.arbVeille||0);

  html += "<div class='bottom'>";
  html += "<div class='mc'><div class='mt'>Motifs no-go visite</div>";
  html += bar("Prix",      d.nogoPrix||0,  nogoTotal, "#ef9f27");
  html += bar("Technique", d.nogoTech||0,  nogoTotal, "#e24b4a");
  html += bar("Juridique", d.nogoJur||0,   nogoTotal, "#7f77dd");
  html += bar("Marché", d.nogoMar||0, nogoTotal, "#888780");
  html += bar("Autre",     d.nogoAutre||0, nogoTotal, "#b4b2a9");
  html += "</div>";
  html += "<div class='mc'><div class='mt'>Arbitrage post-visite</div>";
  html += bar("Offre",    d.arbOffre||0,  arbTotal, "#639922");
  html += bar("Abandon",  d.arbAban||0,   arbTotal, "#e24b4a");
  html += bar("Analyse",  d.arbAna||0,    arbTotal, "#378add");
  html += bar("Veille",   d.arbVeille||0, arbTotal, "#888780");
  html += "</div></div>";

  el.innerHTML = html;
}

async function loadAll() {
  var btn = document.getElementById("btnR");
  btn.classList.add("loading");
  await Promise.all(["mois","trim","annee"].map(loadPeriod));
  btn.classList.remove("loading");
  var now = new Date();
  document.getElementById("lupdate").textContent = "Mis à jour le " + now.toLocaleDateString("fr-FR") + " à " + now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
}

function show(id, btn) {
  document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("on");});
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("on");});
  document.getElementById("p-"+id).classList.add("on");
  btn.classList.add("on");
}

loadAll();
</script>
</body>
</html>
